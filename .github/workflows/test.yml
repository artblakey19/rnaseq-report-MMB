name: Smoke test

# End-to-end sanity check using the fixture under tests/test_data.
# Builds no images — just resolves the DAG with the pipeline source and
# the test config to catch broken wildcards / missing inputs / rule typos.

on:
  push:
    branches: [main]
    paths:
      - 'workflow/**'
      - 'config/**'
      - 'tests/**'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'workflow/**'
      - 'config/**'
      - 'tests/**'
      - '.github/workflows/test.yml'
  workflow_dispatch:

jobs:
  dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Snakemake
        run: |
          python -m pip install --upgrade pip
          pip install snakemake pandas pyyaml

      - name: Snakemake dry-run with test fixture
        run: |
          snakemake \
            --snakefile workflow/Snakefile \
            --configfile tests/test_data/config_test.yaml \
            --dry-run \
            --printshellcmds
