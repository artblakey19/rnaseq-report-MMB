project:
  name: "test-fixture"
  analyst: "ci"
  experiment:
    cell_line: "A549"
    compound: "TestCompound"
    dose: "10 uM"
    duration: "24 h"
    notes: "test fixture"

input:
  counts_tsv: "tests/test_data/counts.tsv"
  multiqc_data_dir: "tests/test_data/multiqc_report_data"
  samples_tsv: "tests/test_data/samples.tsv"
  contrasts_tsv: "tests/test_data/contrasts.tsv"

de:
  primary:
    padj: 0.05
    abs_lfc: 1.0
  secondary:
    padj: 0.10
    abs_lfc: 0.5

enrichment:
  enabled: true
  gsea:
    ranking: "stat"
    min_size: 15
    max_size: 500
    seed: 42
    collections:
      - {id: H, label: Hallmark}
  ora:
    min_input_genes: 100
    max_input_genes: 500
    databases:
      - {id: GO_BP,    label: "GO Biological Process"}
      - {id: KEGG,     label: KEGG}
      - {id: Reactome, label: Reactome}
      - {id: Hallmark, label: Hallmark}

tfea:
  enabled: true
  split_complexes: false
  min_size: 5
  padj_cutoff: 0.05
  top_n: 50

progeny:
  enabled: true
  top_targets: 500

cmap:
  enabled: true
  top_up: 250
  top_down: 250

report:
  formats: ["html"]
