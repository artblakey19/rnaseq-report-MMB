project:
  name: ''
  analyst: ''
  experiment:
    cell_line: ''
    compound: ''
    dose: ''
    duration: ''
    notes: ''
input:
  counts_tsv: ''
  multiqc_data_dir: ''
  samples_tsv: config/samples.tsv
  contrasts_tsv: config/contrasts.tsv
de:
  prefilter_min_count: 10
  prefilter_min_samples_mode: smallest_group
  lfc_shrink: apeglm
  primary:
    padj: 0.05
    abs_lfc: 1.0
  secondary:
    padj: 0.1
    abs_lfc: 0.5
enrichment:
  enabled: true
  gsea:
    ranking: stat
    min_size: 15
    max_size: 500
    seed: 42
    # Add/remove entries to change which MSigDB collections GSEA runs over.
    # `id` is the MSigDB collection string (fetched via msigdbr); `label` is
    # the display name used in the report and notebook.
    collections:
    - {id: H,                   label: Hallmark}
    - {id: C2:CP:REACTOME,      label: Reactome}
    - {id: C2:CP:WIKIPATHWAYS,  label: WikiPathways}
    - {id: C2:CP:PID,           label: PID}
    - {id: C2:CP:BIOCARTA,      label: BioCarta}
    - {id: C2:CGP,              label: CGP}
    - {id: C6,                  label: Oncogenic}
  ora:
    min_input_genes: 100
    max_input_genes: 500
    # `id` values must match a dispatch branch in workflow/scripts/ora.R
    # (GO_BP, KEGG, Reactome, Hallmark). Adding a new id requires adding
    # the enrichment call in that script.
    databases:
    - {id: GO_BP,    label: "GO Biological Process"}
    - {id: KEGG,     label: KEGG}
    - {id: Reactome, label: Reactome}
    - {id: Hallmark, label: Hallmark}
tfea:
  enabled: true
  method: ulm
  split_complexes: false
  min_size: 5
  padj_cutoff: 0.05
  top_n: 50
progeny:
  enabled: true
  top_targets: 500
cmap:
  enabled: true
  service: l2s2
  top_up: 250
  top_down: 250
report:
  formats:
  - html
  - pdf
