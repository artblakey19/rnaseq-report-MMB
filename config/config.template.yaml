project:
  name: ''
  analyst: ''
  experiment:
    cell_line: ''
    compound: ''
    dose: ''
    duration: ''
    notes: ''
input:
  counts_tsv: ''
  multiqc_data_dir: resources/nfcore_output/multiqc/multiqc_data
  samples_tsv: config/samples.tsv
  contrasts_tsv: config/contrasts.tsv
de:
  tool: deseq2
  prefilter_min_count: 10
  prefilter_min_samples_mode: smallest_group
  lfc_shrink: apeglm
  primary:
    padj: 0.05
    abs_lfc: 1.0
  secondary:
    padj: 0.1
    abs_lfc: 0.5
enrichment:
  gsea:
    ranking: stat
    min_size: 15
    max_size: 500
    seed: 42
    collections:
    - H
    - C2:CP:REACTOME
    - C2:CP:WIKIPATHWAYS
    - C2:CP:PID
    - C2:CP:BIOCARTA
    - C2:CGP
    - C6
  ora:
    min_input_genes: 100
    max_input_genes: 500
    databases:
    - GO_BP
    - KEGG
    - Reactome
    - Hallmark
tf_activity:
  tool: decoupler
  network: collectri
  method: ulm
  split_complexes: false
  min_size: 5
  padj_cutoff: 0.05
  top_n: 50
pathway_activity:
  tool: decoupler
  network: progeny
  top_targets: 500
drug_repositioning:
  enabled: true
  service: l2s2
  top_up: 250
  top_down: 250
report:
  formats:
  - html
  - pdf
  theme: default
  logo: report/assets/logo.png
  branding:
    title: Bulk RNA-seq Analysis Report
    footer: Generated by Bulk-RNAseq workflow
resources:
  msigdb_version: 2023.2.Hs
  threads_default: 4
